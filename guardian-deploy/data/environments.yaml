    dev: "76.13.172.17"
    prod: "188.245.190.178"
    confusao_possivel: "SIM — ambos são IPs numéricos"

  - aspect: "Porta N8N"
    dev: ":5678 (exposta diretamente)"
    prod: ":5678 (interna, acessível via Nginx HTTPS)"

  - aspect: "SSH"
    dev: "NÃO temos SSH"
    prod: "SIM — via ~/.ssh/totalassistente"
    confusao_possivel: "NÃO"

  - aspect: "Modo N8N"
    dev: "Self Hosted (single instance)"
    prod: "Queue (main + worker + webhook)"
    confusao_possivel: "NÃO"

  - aspect: "WhatsApp Trigger"
    dev: "FAKE (webhook + code nodes)"
    prod: "REAL (whatsAppTrigger + OAuth)"
    confusao_possivel: "SIM — CRÍTICO durante deploy"

  - aspect: "Credential Supabase"
    dev: "fGwpKYpERyVmR2tt"
    prod: "1ENA7UIm6ILehilJ"
    confusao_possivel: "SIM — CRÍTICO durante deploy"

  - aspect: "Workflows"
    dev: "6 workflows"
    prod: "9 workflows (8 ativos + 1 inativo)"
    confusao_possivel: "SIM — PROD tem mais"

  - aspect: "Workflow IDs"
    dev: "IDs diferentes de PROD"
    prod: "IDs diferentes de DEV"
    confusao_possivel: "SIM — MESMO workflow tem ID diferente em cada ambiente"

  - aspect: "Usuários"
    dev: "Luiz Felipe (teste)"
